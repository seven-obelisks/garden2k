{{ define "header" }}
  {{ partials.Include "page-header.html" . }}
{{ end }}

{{ define "main" }}
<main class="site-container">

  {{- $post_class := "" -}}
  {{- with .File -}}
    {{- $post_class = printf "page-%s" .ContentBaseName -}}
  {{- end -}}

  <article class="{{ $post_class }}">

    <header>
      <h1 class="page_title">
        {{ .Title }}
      </h1>
    </header>

    <div class="event-content lh-copy mb4">
      {{ .Content }}
    </div>

  </article>

</main>
{{ end }}
