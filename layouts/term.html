{{ define "main" }}
  <main class="term-page site-container list-container tag-container">
    <a href="/tags/" class="event_button term-page-back">Tag</a>

    <h1 class="page_title">{{ .Title }}</h1>

    {{ with .Content }}
      <div class="section-intro prose">
        {{ . }}
      </div>
    {{ end }}

    <ul class="content-list">
      {{ range .Pages }}
        <li class="content-card">
          {{ .Render "summary" }}
        </li>
      {{ end }}
    </ul>
  </main>
{{ end }}
