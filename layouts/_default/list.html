{{ define "main" }}
<main class="site-container">

  <h1 class="page_title">{{ .Title }}</h1>

  {{ with .Content }}
    <div class="section-intro">
      {{ . }}
    </div>
  {{ end }}

  {{ if .Pages }}
    <ul>
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
      {{ end }}
    </ul>
  {{ end }}

</main>
{{ end }}
