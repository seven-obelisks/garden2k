{{ define "main" }}
<main class="section-page section-card-page site-container list-container">

  <h1 class="page_title">{{ .Title }}</h1>

  {{ with .Content }}
    <div class="section-intro section-card-intro">
      {{ . }}
    </div>
  {{ end }}

  {{ if .Pages }}
    <ul class="section-card-grid">
      {{ range .Pages.ByWeight }}
        <li class="section-card">
          <a class="section-card-link" href="{{ .RelPermalink }}">
            <span class="section-card-title">{{ .Title }}</span>

            {{ if not .Date.IsZero }}
              <span class="section-card-date">
                {{ .Date.Format "Jan 2, 2006" }}
              </span>
            {{ end }}

            {{ with .Summary }}
              <span class="section-card-summary">
                {{ . | plainify }}
              </span>
            {{ end }}
          </a>
        </li>
      {{ end }}
    </ul>
  {{ end }}

</main>
{{ end }}
