backend:
  name: github
  repo: seven-obelisks/garden2k
  branch: main
  base_url: https://garden2k.com
  auth_endpoint: /api/auth

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "events"
    label: "Events"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    filter:
      field: "type"
      value: "event"
    fields:
      - { label: "Type", name: "type", widget: "hidden", default: "event" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { label: "Event Start", name: "event_start", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { label: "Event End", name: "event_end", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Organizer", name: "event_organizer", widget: "string", required: false }
      - { label: "Event URL", name: "event_url", widget: "string", required: false }
      - { label: "Event Image", name: "image", widget: "image", required: false }
      - label: "Event Color"
        name: "event_color"
        widget: "string"
        default: "var(--color-primary)"
        required: false
        hint: "Examples: var(--color-primary), red, orange, limegreen"
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "posts"
    label: "Blog Posts"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
      - { label: "Cover Image", name: "cover_image", widget: "image", required: false }
      - { label: "Cover Image Alt Text", name: "cover_image_alt", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", required: false, default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    folder: "content/examples"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    format: "frontmatter"
    nested:
      depth: 10
      summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ", required: false }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
      - { label: "Cover Image", name: "cover_image", widget: "image", required: false }
      - { label: "Cover Image Alt Text", name: "cover_image_alt", widget: "string", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", required: false, default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "data/homepage.yml"
        fields:
          - label: "Homepage Banners"
            name: "banners"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text", required: false }
              - { label: "Button Text", name: "button_text", widget: "string", required: false }
              - { label: "Button URL", name: "button_url", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }