baseURL = 'https://garden2k.com/'
locale = 'en-us'
title = 'Garden2k'

[module]
  [[module.imports]]
    path = "github.com/gohugo-ananke/ananke/v2"
    
[params]
  site_logo = "/images/logo.png"

[params.ananke]
  custom_css = ["css/styles.css", "css/overrides.css", "css/calendar.css", "css/slider.css", "css/mobile.css", "css/typography.css", "css/events.css"]

[mediaTypes]
  [mediaTypes."text/calendar"]
    suffixes = ["ics"]

[outputFormats]
  [outputFormats.ICS]
    mediaType = "text/calendar"
    baseName = "event"
    isPlainText = true
    notAlternative = true

[outputs]
  page = ["HTML"]

[[menu.main]]
